# Builds the Argus desktop app for Windows/macOS/Linux and attaches the
# installers (.exe/.msi, .dmg, .AppImage/.deb) to a GitHub Release whenever a
# version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
#
# No secrets required for an unsigned build (this workflow's default). Code
# signing (Apple notarization, Windows Authenticode) can be added later via
# additional secrets — see https://tauri.app/distribute/sign/ — without
# changing this workflow's structure.
name: Desktop Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write   # tauri-action creates/updates the GitHub Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (webkitgtk)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Build a universal binary on macOS so one .dmg covers both Intel
          # and Apple Silicon — matrix.platform is windows/ubuntu on the
          # other legs, where this is a no-op.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          tagName: ${{ github.ref_name }}
          releaseName: "Argus Desktop ${{ github.ref_name }}"
          releaseBody: |
            **Argus** is an AI-powered security audit tool — point it at a repo, it reads the
            code, spins up the app, and attacks it.

            This release is the desktop app: five screens (Dashboard, New Scan, Live Attack,
            Reports, Settings) that can run the real Argus engine against a target.

            ## Install

            | Platform | Download |
            |---|---|
            | Windows | the `.exe` installer (or `.msi`) |
            | macOS (Intel or Apple Silicon) | the `universal.dmg` |
            | Debian / Ubuntu | the `.deb` |
            | Fedora / RHEL / openSUSE | the `.rpm` |
            | Any Linux, no install | the `.AppImage` (`chmod +x` and run) |

            The `Source code` assets are just the repo snapshot at this tag, not something to
            install.

            ## Before you run a real scan

            The desktop app drives the `argus` CLI. Install the engine first — `pip install
            argus-panoptes`, or if that package isn't published yet, build from source: clone this
            repo, then `pip install -e .`. Without it, the app still opens, but falls back to
            bundled demo data.

            ## Known limitations

            - **Unsigned build** — Windows SmartScreen / macOS Gatekeeper will warn on first
              launch. Expected for now; code signing is on the roadmap.

            Full docs: [README](https://github.com/Sarthak-47/ARGUS#readme) ·
            [Security policy](https://github.com/Sarthak-47/ARGUS/blob/main/SECURITY.md)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
