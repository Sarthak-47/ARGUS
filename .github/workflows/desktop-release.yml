# Builds the Argus desktop app for Windows/macOS/Linux and attaches the
# installers (.exe/.msi, .dmg, .AppImage/.deb) to a GitHub Release whenever a
# version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
#
# No secrets required for an unsigned build (this workflow's default). Code
# signing (Apple notarization, Windows Authenticode) can be added later via
# additional secrets — see https://tauri.app/distribute/sign/ — without
# changing this workflow's structure.
name: Desktop Release

on:
  push:
    tags: ["v*"]

jobs:
  # Creates the draft release once, up front. The three platform builds below
  # run in parallel and each used to independently ask tauri-action to
  # "create or find a release for this tag" — under that race, more than one
  # build found nothing yet and created its own release, silently splitting
  # the installers across two separate drafts for the same tag (each job
  # still reported success). Pre-creating it here and having every build job
  # attach to that one release id removes the race entirely.
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # A direct by-tag lookup, not a list-all-and-filter — the latter raced
          # ahead of `gh release create`'s own write on the very first attempt at
          # this (list-based reads and a just-completed create aren't guaranteed
          # to be consistent with each other), silently producing an empty id and
          # sending every platform build's "Build and release" step down the "no
          # releaseId or tagName, skip all uploads" path — 0 assets despite every
          # job reporting success. A direct GET by tag doesn't have that gap.
          #
          # `gh api` writes an error response body (e.g. 404 "Not Found") to
          # STDOUT, not stderr, and exits non-zero — a second attempt at this fix
          # captured that JSON error text itself as a fake "existing id" because
          # it only checked for a non-empty string, not the command's exit code.
          # Gate on the exit code so a failed lookup is never mistaken for a hit.
          if EXISTING_ID=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq .id 2>/dev/null); then
            echo "Reusing existing release $EXISTING_ID for $TAG"
            echo "id=$EXISTING_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cat > /tmp/release_notes.md <<'BODY'
          **Argus** is an AI-powered security audit tool — point it at a repo, it reads the
          code, spins up the app, and attacks it.

          This release is the desktop app: five screens (Dashboard, New Scan, Live Attack,
          Reports, Settings) that can run the real Argus engine against a target.

          ## Install

          | Platform | Download |
          |---|---|
          | Windows | the `.exe` installer (or `.msi`) |
          | macOS (Intel or Apple Silicon) | the `universal.dmg` |
          | Debian / Ubuntu | the `.deb` |
          | Fedora / RHEL / openSUSE | the `.rpm` |
          | Any Linux, no install | the `.AppImage` (`chmod +x` and run) |

          The `Source code` assets are just the repo snapshot at this tag, not something to
          install.

          ## Before you run a real scan

          The desktop app drives the `argus` CLI. Install the engine first — `pip install
          argus-panoptes`, or if that package isn't published yet, build from source: clone this
          repo, then `pip install -e .`. Without it, the app still opens, but falls back to
          bundled demo data.

          ## Known limitations

          - **Unsigned build** — Windows SmartScreen / macOS Gatekeeper will warn on first
            launch. Expected for now; code signing is on the roadmap.

          Full docs: [README](https://github.com/Sarthak-47/ARGUS#readme) ·
          [Security policy](https://github.com/Sarthak-47/ARGUS/blob/main/SECURITY.md)
          BODY
          # The heredoc above is indented to stay inside this YAML `run:` block —
          # strip that indentation back out so the release notes render as normal
          # left-aligned markdown instead of an indented code block.
          sed -i 's/^          //' /tmp/release_notes.md
          # A raw API POST, not `gh release create` — GitHub's tag<->release
          # association lags behind the release write itself just enough that
          # *any* follow-up lookup (list-and-filter, or even a direct GET by
          # tag with retries) intermittently 404ed against a release that
          # unquestionably existed (`gh release create` even printed an
          # "untagged-<sha>" URL for it once, before the tag association had
          # caught up). Reading the id straight out of the creation response
          # itself has no such race — there's no second request to be stale.
          NEW_ID=$(gh api "repos/${{ github.repository }}/releases" -X POST \
            -f tag_name="$TAG" \
            -f name="Argus Desktop $TAG" \
            -f body=@/tmp/release_notes.md \
            -F draft=true \
            -F prerelease=false \
            --jq .id)
          if [ -z "$NEW_ID" ]; then
            echo "::error::Release creation returned no id"
            exit 1
          fi
          echo "Created release $NEW_ID for $TAG"
          echo "id=$NEW_ID" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    permissions:
      contents: write   # tauri-action uploads assets to the pre-created release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (webkitgtk)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Build a universal binary on macOS so one .dmg covers both Intel
          # and Apple Silicon — matrix.platform is windows/ubuntu on the
          # other legs, where this is a no-op.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the bundled Argus CLI (PyInstaller)
        shell: bash
        run: |
          pip install -e . pyinstaller
          pyinstaller packaging/argus.spec --distpath dist
          # onedir, not onefile — a onefile build self-extracts its entire
          # payload to a temp dir on *every single launch* (~1.1s measured
          # overhead per invocation), and the desktop app invokes this CLI many
          # times per session (a status/history check on nearly every screen
          # navigation, plus scan/report per action) — that overhead compounded
          # into the app visibly lagging on every click. onedir unpacks once at
          # build time; copy the whole produced directory, not a single file.
          mkdir -p gui/src-tauri/binaries
          cp -R dist/argus-cli gui/src-tauri/binaries/argus-cli
          if [ "${{ matrix.platform }}" != "windows-latest" ]; then
            chmod +x gui/src-tauri/binaries/argus-cli/argus-cli
          fi

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
