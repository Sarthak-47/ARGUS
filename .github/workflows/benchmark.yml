# Benchmarks Argus against known-vulnerable apps (OWASP Juice Shop, DVWA,
# VAmPI) plus the bundled demo target, and publishes a real detection rate —
# see argus/benchmark.py and ROADMAP.md's "Proof is marketing" note. Runs on
# every version tag push — before the draft release is manually published —
# so a real accuracy regression is visible and failing here is a signal to
# hold the release, not a fact reported after the release already went out.
# Also runnable manually. ubuntu-latest has a live Docker daemon, so the
# Docker-based cases genuinely pull and attack real images here even though a
# local dev machine may not have Docker running.

name: Benchmark

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  benchmark:
    name: Run benchmark suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (with sandbox + browser extras for Docker cases and JS-aware crawling)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sandbox,browser]"
          python -m playwright install --with-deps chromium

      - name: Run benchmark suite
        run: |
          argus benchmark --format markdown --output benchmark-results.md --min-detection-rate 0.5
          cat benchmark-results.md >> "$GITHUB_STEP_SUMMARY"
          cat benchmark-results.md

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark-results.md
