name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (with dev extras)
        run: |
          python -m pip install --upgrade pip
          # sandbox pulls in the docker Python SDK — ubuntu-latest runners have
          # a live Docker daemon, so test_sandbox.py's live tests actually run
          # here rather than skipping. mcp exercises test_mcp_server.py the
          # same way instead of pytest.importorskip-ing it.
          pip install -e ".[dev,sandbox,mcp]"

      - name: Lint (ruff)
        run: ruff check argus tests

      - name: Test (pytest)
        run: pytest -q

  gui:
    name: GUI (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

  desktop:
    name: Desktop shell (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies (webkitgtk)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gui/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('gui/src-tauri/Cargo.lock') }}

      - name: cargo check (fast compile-error catch, no full build)
        working-directory: gui/src-tauri
        run: cargo check

  docker:
    name: Docker image (build + smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t argus .

      - name: Smoke test — CLI runs and lists commands
        run: |
          docker run --rm argus --version
          docker run --rm argus --help
