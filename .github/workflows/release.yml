# Publishes argus-sec to PyPI when a version tag is pushed (e.g. `git tag v0.1.0`).
#
# One-time setup (no API token needed): on PyPI, add this repo as a Trusted
# Publisher for the `argus-sec` project (Publishing → Add a pending publisher):
#   owner: Sarthak-47   repo: ARGUS   workflow: release.yml   environment: pypi
# After that, tagging a release publishes automatically via OIDC.
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing (OIDC) — no token secret required
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
