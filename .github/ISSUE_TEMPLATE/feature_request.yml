name: Feature request
description: Suggest a new attack agent, rule, integration, or capability.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check [ROADMAP.md](https://github.com/Sarthak-47/ARGUS/blob/main/ROADMAP.md)
        first — it may already be planned or explicitly out of scope with a reason.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A vulnerability class Argus misses, a workflow that's clunky, an integration you need.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you'd expect this to work. A new agent? A CLI flag? A report format?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked ROADMAP.md and this isn't already planned or explicitly out of scope
