name: "Argus Security Scan"
description: "AI-powered security audit — static analysis with SARIF output for GitHub code scanning."
author: "Sarthak-47"
branding:
  icon: "eye"
  color: "yellow"

inputs:
  target:
    description: "Path or repo URL to scan."
    required: false
    default: "."
  fail-on:
    description: "Fail the job if a finding at/above this severity exists (critical|high|medium|low). Empty = never fail."
    required: false
    default: ""
  policy:
    description: "Path to a policy file (.argus-policy.toml) for per-rule CI gating. Overrides fail-on. Empty = auto-detect one in the target dir."
    required: false
    default: ""
  diff-base:
    description: "Only report findings in files changed vs this git ref (e.g. the PR base branch). Empty = scan everything."
    required: false
    default: ""
  baseline:
    description: "Path to a committed baseline file (from `argus scan --write-baseline`). Only findings absent from it are reported/gated. Empty = report all."
    required: false
    default: ""
  format:
    description: "Report format to produce (sarif|json|html|markdown)."
    required: false
    default: "sarif"
  pr-comments:
    description: "Post new findings as inline GitHub PR review comments, in addition to the SARIF upload. Needs `pull-requests: write` permission on the calling job. A no-op outside a pull_request event, so it's safe to leave on for every trigger."
    required: false
    default: "false"
  version:
    description: "Argus version/ref to install (PyPI version, or a git ref). Default: latest from PyPI."
    required: false
    default: ""

outputs:
  sarif-file:
    description: "Path to the generated SARIF file."
    value: ${{ steps.scan.outputs.sarif-file }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install Argus
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "argus-panoptes==${{ inputs.version }}" \
            || pip install "git+https://github.com/Sarthak-47/ARGUS.git@${{ inputs.version }}"
        else
          pip install argus-panoptes \
            || pip install "git+https://github.com/Sarthak-47/ARGUS.git"
        fi

    - name: Run Argus scan
      id: scan
      shell: bash
      run: |
        FAIL_FLAG=""
        if [ -n "${{ inputs.fail-on }}" ]; then FAIL_FLAG="--fail-on ${{ inputs.fail-on }}"; fi
        POLICY_FLAG=""
        if [ -n "${{ inputs.policy }}" ]; then POLICY_FLAG="--policy ${{ inputs.policy }}"; fi
        DIFF_FLAG=""
        if [ -n "${{ inputs.diff-base }}" ]; then DIFF_FLAG="--diff-base ${{ inputs.diff-base }}"; fi
        BASELINE_FLAG=""
        if [ -n "${{ inputs.baseline }}" ]; then BASELINE_FLAG="--baseline ${{ inputs.baseline }}"; fi
        argus scan "${{ inputs.target }}" --no-llm --format "${{ inputs.format }}" $FAIL_FLAG $POLICY_FLAG $DIFF_FLAG $BASELINE_FLAG
        echo "sarif-file=argus-report/argus.sarif" >> "$GITHUB_OUTPUT"

    - name: Post PR review comments
      # Runs even if the scan step above failed the job (e.g. --fail-on tripped)
      # so the inline comments still land — same pattern as a SARIF upload.
      if: ${{ inputs.pr-comments == 'true' && !cancelled() }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: argus pr-comment
