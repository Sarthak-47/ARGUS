<svg width="1280" height="380" viewBox="0 0 1280 380" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08080C"/>
      <stop offset="1" stop-color="#0F0F15"/>
    </linearGradient>
    <radialGradient id="glow" cx="640" cy="120" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B8860B" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#B8860B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D4A853"/>
      <stop offset="1" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="380" fill="url(#bg)"/>
  <rect width="1280" height="380" fill="url(#glow)"/>

  <!-- border frame -->
  <rect x="16" y="16" width="1248" height="348" fill="none" stroke="#4A4035" stroke-width="1"/>
  <rect x="22" y="22" width="1236" height="336" fill="none" stroke="#2A1F0E" stroke-width="1"/>

  <!-- eye / lens motif -->
  <g transform="translate(150,180)">
    <circle r="72" fill="none" stroke="#B8860B" stroke-width="1.5" opacity="0.55"/>
    <circle r="54" fill="none" stroke="#8B4513" stroke-width="1" opacity="0.4"/>
    <path d="M -60 0 Q 0 -46 60 0 Q 0 46 -60 0 Z" fill="none" stroke="#D4A853" stroke-width="2"/>
    <circle r="16" fill="#0F0F15" stroke="#D4A853" stroke-width="2"/>
    <circle r="6" fill="#B8860B"/>
    <!-- rays -->
    <g stroke="#8B4513" stroke-width="1" opacity="0.5">
      <line x1="0" y1="-80" x2="0" y2="-94"/>
      <line x1="0" y1="80" x2="0" y2="94"/>
      <line x1="-80" y1="0" x2="-94" y2="0"/>
      <line x1="80" y1="0" x2="94" y2="0"/>
      <line x1="-56" y1="-56" x2="-66" y2="-66"/>
      <line x1="56" y1="-56" x2="66" y2="-66"/>
      <line x1="-56" y1="56" x2="-66" y2="66"/>
      <line x1="56" y1="56" x2="66" y2="66"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="290" y="150" font-size="64" letter-spacing="14" fill="url(#goldText)" font-weight="bold">ARGUS</text>
  <text x="292" y="186" font-size="19" letter-spacing="2" fill="#C4A882" font-style="italic">The security tool built for the vibe-coding era.</text>
  <text x="292" y="216" font-size="15" letter-spacing="0.5" fill="#6B5A45">Point it at a repo. It reads the code, spins up the app, and attacks it.</text>

  <!-- terminal strip -->
  <g transform="translate(292,246)">
    <rect width="760" height="90" rx="3" fill="#0F0F15" stroke="#2A1F0E"/>
    <circle cx="16" cy="16" r="4" fill="#8B0000"/>
    <circle cx="32" cy="16" r="4" fill="#8B4513"/>
    <circle cx="48" cy="16" r="4" fill="#4A4035"/>
    <g fill="none" stroke="#8B0000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 34 L8 38 L16 28" transform="translate(0,0)"/>
    </g>
    <text x="16" y="42" font-family="'Consolas','Courier New',monospace" font-size="12.5" fill="#8B0000">[INJECTOR:SQLI-ERROR]           SQL injection (error-based)</text>
    <g fill="none" stroke="#CD7F32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 52 L8 56 L16 46"/>
    </g>
    <text x="16" y="60" font-family="'Consolas','Courier New',monospace" font-size="12.5" fill="#CD7F32">[AUTHBREAKER:JWT-WEAK-SECRET]   JWT signed with a weak secret</text>
    <g fill="none" stroke="#D4A853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 70 L8 74 L16 64"/>
    </g>
    <text x="16" y="78" font-family="'Consolas','Courier New',monospace" font-size="12.5" fill="#D4A853">[SSRFPROBER:CALLBACK]           Server-Side Request Forgery (blind)</text>
  </g>

  <!-- footer strip -->
  <text x="292" y="368" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#4A4035" letter-spacing="1">STATIC SCAN &#183; LIVE ATTACK SWARM &#183; LLM-EXPLAINED FIXES &#183; MCP &amp; PROMPT-INJECTION AWARE</text>
</svg>
